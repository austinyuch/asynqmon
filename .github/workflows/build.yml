name: build

# CI 最小化策略(仿 austinyuch/asynq):權威測試 gate 在 local,
# CI 只在 PR → main 時做最後防線;單一 Go 版本、單一 job。
on:
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      redis:
        image: valkey/valkey:9.1.0
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: UI lint + unit tests
        run: |
          cd ui
          corepack enable
          yarn install --frozen-lockfile --ignore-engines
          yarn lint
          yarn test

  e2e:
    # Functional browser smoke against the canonical demo scenario
    # (docs/manual/demo). VRT stays local-only by design (SPEC-005).
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:9.1.0
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26.x
          cache: true

      - name: Build server and demo
        run: |
          go build -o /tmp/asynqmon ./cmd/asynqmon
          go build -o /tmp/demo ./docs/manual/demo

      - name: Start demo worker + server
        run: |
          /tmp/demo -redis_addr=localhost:6379 &
          sleep 10
          /tmp/asynqmon --port=8080 --redis-addr=localhost:6379 &
          sleep 3
          curl -sf http://localhost:8080/api/queues > /dev/null

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run E2E smoke
        run: |
          cd ui
          corepack enable
          yarn install --frozen-lockfile --ignore-engines
          npx playwright install chromium --with-deps
          ASYNQMON_BASE_URL=http://localhost:8080 npx playwright test e2e/smoke.spec.ts
